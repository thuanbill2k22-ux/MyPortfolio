[build]
  # Chỉ định thư mục chứa code của ông
  base = "my portfolio/"
  
  # Lệnh build (tui đoán ông dùng Vite/React dựa trên file env.d.ts nãy thấy)
  command = "npm run build"
  
  # Thư mục chứa kết quả build sau khi xong
  publish = "dist/"

[[redirects]]
  # Fix lỗi 404 khi ông dùng react-router-dom và nhấn F5
  from = "/*"
  to = "/index.html"
  status = 200